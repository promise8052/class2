<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기체의 성질 마무리 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* 20% 업스케일 기준값 적용 */
  :root{
    --sky:#4FC3F7;--sky-light:#E1F5FE;--sky-dark:#0288D1;
    --green:#66BB6A;--green-light:#E8F5E9;--green-dark:#2E7D32;
    --red:#EF5350;--red-light:#FFEBEE;
    --bg:#F0F8FF;--white:#FFFFFF;
    --text:#1A237E;--text-mid:#455A64;--text-soft:#90A4AE;
    --radius:24px;--radius-sm:15px;
    --shadow-card:0 8px 32px rgba(2,136,209,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{font-size:19px;} /* base 16 → 19.2 ≈ 19 (+20%) */
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-80px;right:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(79,195,247,0.18) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;}

  /* max-width도 20% 확대: 480 → 576 */
  .page{width:100%;max-width:576px;min-height:100vh;display:flex;flex-direction:column;padding:0 19px 48px;position:relative;z-index:1;}

  /* ── 헤더 ── */
  .header{text-align:center;padding:34px 0 19px;}
  .header .balloon-row{font-size:38px;line-height:1;margin-bottom:10px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .header h1{font-size:24px;font-weight:700;color:var(--text);line-height:1.3;}
  .header .subtitle{font-size:14px;color:var(--text-soft);margin-top:5px;}

  /* ── 진행률 ── */
  .progress-area{margin-bottom:19px;}
  .progress-meta{display:flex;justify-content:space-between;font-size:15px;color:var(--text-mid);margin-bottom:7px;font-weight:500;}
  .progress-track{background:#BBDEFB;border-radius:99px;height:12px;overflow:hidden;}
  .progress-fill{height:12px;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--sky-dark));transition:width 0.5s cubic-bezier(.4,0,.2,1);}

  /* ── 문제 카드 ── */
  .question-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:24px 22px 22px;margin-bottom:17px;border:2px solid rgba(79,195,247,0.2);animation:slideIn 0.35s cubic-bezier(.4,0,.2,1);}
  @keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .q-badge{display:inline-block;background:var(--sky-dark);color:white;font-size:14px;font-weight:700;padding:5px 15px;border-radius:99px;margin-bottom:12px;}
  .q-text{font-size:22px;font-weight:700;color:var(--text);line-height:1.5;}
  .q-hint{font-size:15px;color:var(--text-soft);margin-top:7px;}

  /* 사진 영역 */
  .q-image-wrap{margin:17px 0 5px;border-radius:var(--radius-sm);overflow:hidden;border:2px solid #B3E5FC;background:white;text-align:center;}
  .q-image-wrap img{width:100%;max-height:192px;object-fit:contain;display:block;padding:12px;}
  .q-image-caption{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0 12px;font-size:17px;font-weight:700;color:var(--sky-dark);border-top:1px dashed #B3E5FC;}

  /* ── 이미지형 선택지 (Q1·Q3) ── */
  .options-visual{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:17px;}
  .vis-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
    padding:17px 7px 15px;background:var(--white);border-radius:var(--radius-sm);
    border:3px solid #B3E5FC;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
    font-size:16px;font-weight:700;color:var(--text);transition:all 0.18s;
    box-shadow:0 2px 10px rgba(2,136,209,0.09);text-align:center;min-height:108px;
    -webkit-user-select:none;user-select:none;}
  .vis-btn:active{transform:scale(0.95);}
  .vis-btn .v-icon{font-size:46px;line-height:1;}
  .vis-btn .v-label{font-size:16px;font-weight:700;line-height:1.3;}
  .vis-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);animation:bumpIn 0.3s;}
  .vis-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);animation:shake 0.35s;}

  /* ── 텍스트형 선택지 (Q2) ── */
  .options-col{display:flex;flex-direction:column;gap:12px;margin-bottom:17px;}
  .opt-btn{display:flex;align-items:center;gap:17px;padding:20px 22px;background:var(--white);
    border-radius:var(--radius-sm);border:3px solid #B3E5FC;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:500;color:var(--text);
    transition:all 0.18s;box-shadow:0 2px 10px rgba(2,136,209,0.08);
    text-align:left;width:100%;-webkit-user-select:none;user-select:none;min-height:68px;}
  .opt-btn:active{transform:scale(0.97);}
  .opt-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);animation:bumpIn 0.3s;}
  .opt-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);animation:shake 0.35s;}
  .opt-icon{font-size:31px;flex-shrink:0;}

  @keyframes bumpIn{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  /* ── 피드백 ── */
  .feedback{border-radius:var(--radius-sm);padding:19px 22px;font-size:19px;font-weight:600;text-align:center;line-height:1.5;margin-bottom:14px;display:none;animation:popIn 0.3s cubic-bezier(.4,0,.2,1);}
  @keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
  .feedback.correct-fb{background:var(--green-light);color:var(--green-dark);border:2px solid #A5D6A7;}
  .feedback.wrong-fb{background:var(--red-light);color:var(--red);border:2px solid #FFCDD2;}

  /* ── 다음 버튼 ── */
  .next-btn{width:100%;padding:20px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--sky),var(--sky-dark));color:white;font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 5px 19px rgba(2,136,209,0.35);display:none;transition:all 0.18s;}
  .next-btn:active{transform:scale(0.97);}

  /* ── 퀴즈 결과 ── */
  .result-page{display:none;flex-direction:column;align-items:center;text-align:center;padding:24px 0 0;animation:slideIn 0.4s cubic-bezier(.4,0,.2,1);}
  .result-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:34px 29px 29px;width:100%;border:2px solid rgba(79,195,247,0.2);}
  .result-emoji{font-size:67px;margin-bottom:10px;animation:float 3s ease-in-out infinite;}
  .result-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:5px;}
  .score-display{font-size:58px;font-weight:700;color:var(--sky-dark);line-height:1;margin:14px 0 2px;}
  .score-out{font-size:17px;color:var(--text-soft);margin-bottom:14px;}
  .stars{font-size:36px;margin-bottom:14px;letter-spacing:5px;}
  .result-msg{font-size:18px;font-weight:600;color:var(--text-mid);line-height:1.6;background:var(--sky-light);border-radius:var(--radius-sm);padding:14px 17px;margin-bottom:19px;}
  .answer-review{width:100%;margin-bottom:19px;}
  .review-title{font-size:15px;font-weight:700;color:var(--text-soft);text-align:left;margin-bottom:10px;}
  .review-item{display:flex;align-items:center;gap:12px;padding:12px 17px;border-radius:var(--radius-sm);margin-bottom:7px;font-size:17px;font-weight:500;text-align:left;}
  .review-item.ok{background:var(--green-light);color:var(--green-dark);}
  .review-item.ng{background:var(--red-light);color:var(--red);}
  .review-dot{font-size:22px;flex-shrink:0;}
  .game-start-btn{width:100%;padding:19px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,#FF6B6B,#FF4757);color:white;font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 5px 19px rgba(255,71,87,0.4);margin-bottom:12px;transition:all 0.18s;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 5px 19px rgba(255,71,87,0.4)}50%{transform:scale(1.02);box-shadow:0 7px 29px rgba(255,71,87,0.6)}}
  .game-start-btn:active{transform:scale(0.97);}
  .retry-btn{width:100%;padding:17px;border-radius:var(--radius-sm);border:3px solid #B3E5FC;background:transparent;color:var(--sky-dark);font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:700;cursor:pointer;}
  .retry-btn:active{background:var(--sky-light);}

  /* ── 풍선 게임 ── */
  #game-page{display:none;width:100%;flex-direction:column;}
  .game-hud{display:flex;align-items:center;justify-content:space-between;padding:12px 4px 10px;margin-bottom:5px;gap:10px;}
  .hud-box{background:var(--white);border-radius:var(--radius-sm);box-shadow:var(--shadow-card);padding:10px 0;text-align:center;border:2px solid rgba(79,195,247,0.2);flex:1;}
  .hud-label{font-size:13px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em;}
  .hud-value{font-size:29px;font-weight:700;color:var(--text);line-height:1.1;}
  .hud-value.timer-urgent{color:var(--red);animation:timerShake 0.3s ease-in-out infinite;}
  @keyframes timerShake{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  #game-canvas-wrap{position:relative;width:100%;border-radius:var(--radius);overflow:hidden;background:linear-gradient(180deg,#87CEEB 0%,#B0E0FF 60%,#E1F5FE 100%);border:2px solid rgba(79,195,247,0.3);box-shadow:var(--shadow-card);}
  #game-canvas{display:block;width:100%;touch-action:none;}

  /* 펑 이펙트 */
  .pop-effect{position:absolute;pointer-events:none;font-size:43px;animation:popOut 0.6s ease-out forwards;z-index:10;}
  @keyframes popOut{0%{opacity:1;transform:scale(0.5)}40%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(2.2) translateY(-30px)}}
  /* 기체 텍스트 */
  .gas-text{position:absolute;pointer-events:none;font-size:15px;font-weight:700;color:var(--sky-dark);background:rgba(255,255,255,0.92);border-radius:99px;padding:4px 12px;animation:gasFloat 1s ease-out forwards;z-index:10;}
  @keyframes gasFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
  /* 똥 맞았을 때 X 이펙트 */
  .poop-hit{position:absolute;pointer-events:none;font-size:36px;font-weight:900;color:#c0392b;animation:popOut 0.6s ease-out forwards;z-index:10;}
  /* 점수 -1 표시 */
  .minus-text{position:absolute;pointer-events:none;font-size:22px;font-weight:700;color:#c0392b;animation:gasFloat 0.9s ease-out forwards;z-index:10;}

  /* 게임 오버 카드 */
  .gameover-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:38px 29px;text-align:center;border:2px solid rgba(79,195,247,0.2);animation:slideIn 0.4s cubic-bezier(.4,0,.2,1);margin-top:10px;}
  .gameover-emoji{font-size:77px;margin-bottom:14px;animation:float 3s ease-in-out infinite;}
  .gameover-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:10px;}
  .gameover-score{font-size:62px;font-weight:700;color:#FF4757;line-height:1;margin:10px 0 5px;}
  .gameover-sub{font-size:17px;color:var(--text-soft);margin-bottom:19px;}
  .gameover-msg{font-size:18px;font-weight:600;color:var(--text-mid);background:#FFF0F0;border-radius:var(--radius-sm);padding:14px 17px;margin-bottom:24px;line-height:1.6;}
  .fact-box{background:var(--sky-light);border-radius:var(--radius-sm);padding:14px 17px;margin-bottom:24px;font-size:17px;color:var(--sky-dark);font-weight:600;line-height:1.6;border:2px solid #B3E5FC;}
  .replay-btn{width:100%;padding:18px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,#FF6B6B,#FF4757);color:white;font-family:'Noto Sans KR',sans-serif;font-size:19px;font-weight:700;cursor:pointer;box-shadow:0 5px 19px rgba(255,71,87,0.35);margin-bottom:12px;}
  .replay-btn:active{transform:scale(0.97);}
  .home-btn{width:100%;padding:17px;border-radius:var(--radius-sm);border:3px solid #B3E5FC;background:transparent;color:var(--sky-dark);font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:700;cursor:pointer;}

  /* ── 인트로 ── */
  .intro-page{display:flex;flex-direction:column;align-items:center;text-align:center;padding:12px 0 0;}
  .intro-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:38px 29px;width:100%;border:2px solid rgba(79,195,247,0.2);}
  .intro-big{font-size:77px;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
  .intro-card h2{font-size:26px;font-weight:700;color:var(--text);margin-bottom:10px;}
  .intro-card p{font-size:17px;color:var(--text-mid);line-height:1.7;margin-bottom:29px;}
  .info-chips{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:29px;}
  .chip{background:var(--sky-light);color:var(--sky-dark);font-size:15px;font-weight:600;padding:7px 17px;border-radius:99px;}
  .start-btn{width:100%;padding:22px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--sky),var(--sky-dark));color:white;font-family:'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;cursor:pointer;box-shadow:0 5px 24px rgba(2,136,209,0.35);transition:all 0.18s;}
  .start-btn:active{transform:scale(0.97);}
</style>
</head>
<body>
<div class="page">

  <div class="header" id="main-header">
    <div class="balloon-row" id="header-balloon">🎈</div>
    <h1 id="header-title">기체의 성질<br>마무리 퀴즈</h1>
    <div class="subtitle" id="header-subtitle">고등 1학년 2반 · 과학</div>
  </div>

  <!-- 인트로 -->
  <div class="intro-page" id="intro-page">
    <div class="intro-card">
      <div class="intro-big">💨</div>
      <h2>오늘 배운 내용을<br>확인해봐요!</h2>
      <p>버튼을 눌러서 정답을 골라요.<br>천천히, 잘 생각하면 돼요! 😊</p>
      <div class="info-chips">
        <span class="chip">📝 문제 3개</span>
        <span class="chip">🖐 터치로 선택</span>
        <span class="chip">⭐ 별 3개 목표</span>
      </div>
      <button class="start-btn" onclick="startQuiz()">시작하기 →</button>
    </div>
  </div>

  <!-- 퀴즈 -->
  <div id="quiz-page" style="display:none;width:100%;">
    <div class="progress-area">
      <div class="progress-meta">
        <span id="step-label">문제 1 / 3</span>
        <span id="score-label">맞은 수: 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="question-card" id="question-card">
      <div class="q-badge" id="q-badge">Q1</div>
      <div class="q-text" id="q-text"></div>
      <div id="q-image-area"></div>
      <div class="q-hint" id="q-hint"></div>
    </div>
    <div id="options-area"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  </div>

  <!-- 퀴즈 결과 -->
  <div class="result-page" id="result-page">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">수고했어요!</div>
      <div class="score-display" id="score-display">0</div>
      <div class="score-out">/ 3문제</div>
      <div class="stars" id="stars"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="answer-review" id="answer-review"></div>
      <button class="game-start-btn" onclick="goToGame()">🎈 풍선 터뜨리기 게임!</button>
      <button class="retry-btn" onclick="restartQuiz()">🔄 퀴즈 다시 풀기</button>
    </div>
  </div>

  <!-- 풍선 게임 -->
  <div id="game-page" style="display:none;width:100%;flex-direction:column;">
    <div class="game-hud">
      <div class="hud-box">
        <div class="hud-label">⏱ 남은 시간</div>
        <div class="hud-value" id="hud-timer">100</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">🎈 터뜨린 수</div>
        <div class="hud-value" id="hud-score">0</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">💩 감점</div>
        <div class="hud-value" id="hud-minus" style="color:#c0392b;">0</div>
      </div>
    </div>
    <div id="game-canvas-wrap">
      <canvas id="game-canvas"></canvas>
    </div>
    <!-- 게임 오버 -->
    <div id="gameover-area" style="display:none;">
      <div class="gameover-card">
        <div class="gameover-emoji" id="go-emoji">🎊</div>
        <div class="gameover-title" id="go-title">게임 끝!</div>
        <div class="gameover-score" id="go-score">0</div>
        <div class="gameover-sub">점 (풍선 <span id="go-balloon">0</span>개 - 똥 <span id="go-poop">0</span>개)</div>
        <div class="gameover-msg" id="go-msg"></div>
        <div class="fact-box">💨 풍선을 터뜨리면 안에 있던 <b>기체(공기)</b>가 쏙! 나와요.<br>기체는 공간을 차지하고 있어요! 👍</div>
        <button class="replay-btn" onclick="replayGame()">🎈 다시 하기</button>
        <button class="home-btn" onclick="goHome()">🏠 처음으로</button>
      </div>
    </div>
  </div>

let current=0,score=0,answered=false,answerLog=[];

function startQuiz(){
  document.getElementById('intro-page').style.display='none';
  document.getElementById('quiz-page').style.display='block';
  renderQuestion();
}
function renderQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('q-badge').textContent=q.badge;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-hint').textContent=q.hint||'';
  document.getElementById('step-label').textContent='문제 '+(current+1)+' / '+questions.length;
  document.getElementById('score-label').textContent='맞은 수: '+score;
  document.getElementById('progress-fill').style.width=((current/questions.length)*100)+'%';
  const imgArea=document.getElementById('q-image-area');
  imgArea.innerHTML=q.img?'<div class="q-image-wrap"><img src="'+q.img+'" alt="문제 사진"><div class="q-image-caption">'+q.caption+'</div></div>':'';
  const fb=document.getElementById('feedback');
  fb.style.display='none';fb.className='feedback';
  document.getElementById('next-btn').style.display='none';
  const card=document.getElementById('question-card');
  card.style.animation='none';void card.offsetWidth;card.style.animation='slideIn 0.35s cubic-bezier(.4,0,.2,1)';
  const area=document.getElementById('options-area');
  area.innerHTML='';
  if(q.type==='visual'){
    const grid=document.createElement('div');grid.className='options-visual';
    q.options.forEach((opt,i)=>{
      const btn=document.createElement('button');btn.className='vis-btn';
      btn.innerHTML='<span class="v-icon">'+opt.icon+'</span><span class="v-label">'+opt.label+'</span>';
      btn.onclick=()=>handleAnswer(i,btn,grid,q);grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else {
    const col=document.createElement('div');col.className='options-col';
    q.options.forEach((opt,i)=>{
      const btn=document.createElement('button');btn.className='opt-btn';
      btn.innerHTML='<span class="opt-icon">'+opt.icon+'</span><span>'+opt.label+'</span>';
      btn.onclick=()=>handleAnswer(i,btn,col,q);col.appendChild(btn);
    });
    area.appendChild(col);
  }
}
function handleAnswer(idx,btn,container,q){
  if(answered)return;answered=true;
  container.querySelectorAll('button').forEach((b,i)=>{b.style.pointerEvents='none';if(q.options[i].correct)b.className+=' correct';});
  const ok=q.options[idx].correct;
  if(!ok)btn.className+=' wrong';
  if(ok)score++;
  answerLog.push({q:q.text,correct:ok});
  const fb=document.getElementById('feedback');
  fb.textContent=ok?q.okMsg:q.ngMsg;fb.className='feedback '+(ok?'correct-fb':'wrong-fb');fb.style.display='block';
  const nb=document.getElementById('next-btn');nb.style.display='block';
  nb.textContent=current<questions.length-1?'다음 문제 →':'결과 보기 🎉';
}
function nextQuestion(){current++;if(current<questions.length)renderQuestion();else showResult();}
function showResult(){
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('result-page').style.display='flex';
  document.getElementById('score-display').textContent=score;
  let emoji,title,stars,msg;
  if(score===3){emoji='🎉';title='완벽해요!';stars='⭐⭐⭐';msg='기체의 성질을 모두 이해했어요!\n정말 잘했어요! 👏';}
  else if(score===2){emoji='😊';title='잘했어요!';stars='⭐⭐';msg='거의 다 맞았어요!\n한 번 더 복습하면 완벽해질 거예요!';}
  else if(score===1){emoji='🌱';title='수고했어요!';stars='⭐';msg='한 문제 맞혔어요!\n선생님과 함께 다시 해봐요.';}
  else{emoji='💪';title='괜찮아요!';stars='🌱🌱🌱';msg='선생님이 도와드릴게요.\n다시 한 번 도전해봐요!';}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('stars').textContent=stars;
  document.getElementById('result-msg').textContent=msg;
  const review=document.getElementById('answer-review');
  review.innerHTML='<div class="review-title">📋 문제별 결과</div>';
  answerLog.forEach((item,i)=>{
    const d=document.createElement('div');d.className='review-item '+(item.correct?'ok':'ng');
    d.innerHTML='<span class="review-dot">'+(item.correct?'⭕':'❌')+'</span><span>Q'+(i+1)+'. '+item.q+'</span>';
    review.appendChild(d);
  });
}
function restartQuiz(){
  current=0;score=0;answered=false;answerLog=[];
  document.getElementById('result-page').style.display='none';
  document.getElementById('quiz-page').style.display='block';
  renderQuestion();
}

/* ────────────────────────────────
   풍선 터뜨리기 게임
──────────────────────────────── */
const BALLOON_COLORS=['#FF6B6B','#FFD93D','#6BCB77','#FF9F43','#54A0FF','#FF6BCD','#A29BFE'];
const GAME_DURATION=100; /* ← 100초 */
let objects=[],gameScore=0,poopCount=0,gameTimer=GAME_DURATION,gameRunning=false;
let gameInterval=null,spawnTimeout=null,animFrame=null;
let canvas,ctx,cw,ch;

const balloonImg=new Image();
balloonImg.src=BALLOON_IMG_SRC;

function goToGame(){
  document.getElementById('result-page').style.display='none';
  document.getElementById('header-balloon').textContent='🎈';
  document.getElementById('header-title').innerHTML='풍선 터뜨리기!';
  document.getElementById('header-subtitle').textContent='🎈 풍선만 눌러요! 💩 똥은 누르면 안돼요!';
  const gp=document.getElementById('game-page');
  gp.style.display='flex';
  document.getElementById('gameover-area').style.display='none';
  document.getElementById('game-canvas-wrap').style.display='block';
  initGame();
}

function initGame(){
  canvas=document.getElementById('game-canvas');
  const wrap=document.getElementById('game-canvas-wrap');
  cw=wrap.clientWidth;
  ch=Math.min(window.innerHeight*0.55,460);
  canvas.width=cw;canvas.height=ch;canvas.style.height=ch+'px';
  ctx=canvas.getContext('2d');
  objects=[];gameScore=0;poopCount=0;gameTimer=GAME_DURATION;gameRunning=true;
  document.getElementById('hud-timer').textContent=gameTimer;
  document.getElementById('hud-score').textContent=gameScore;
  document.getElementById('hud-minus').textContent=poopCount;
  document.getElementById('hud-timer').className='hud-value';
  canvas.ontouchstart=handleTouch;
  canvas.onmousedown=handleMouse;
  clearInterval(gameInterval);
  gameInterval=setInterval(gameTick,1000);
  scheduleSpawn();
  renderGame();
}

function gameTick(){
  if(!gameRunning)return;
  gameTimer--;
  const el=document.getElementById('hud-timer');
  el.textContent=gameTimer;
  if(gameTimer<=10)el.className='hud-value timer-urgent';
  else if(gameTimer<=30)el.style.color='#FF9F43';
  if(gameTimer<=0)endGame();
}

/* 남은 시간에 따라 스폰 간격 */
function getSpawnInterval(){
  const r=gameTimer/GAME_DURATION;
  if(r>0.7)return 2000;
  if(r>0.45)return 1400;
  if(r>0.2)return 900;
  return 550;
}

/* 남은 시간에 따라 한 번에 몇 개 */
function getSpawnCount(){
  const r=gameTimer/GAME_DURATION;
  if(r>0.6)return 1;
  if(r>0.3)return 2;
  return 3;
}

/* 똥 비율: 초반엔 적게, 후반엔 조금 더 */
function getPoopRatio(){
  const r=gameTimer/GAME_DURATION;
  if(r>0.6)return 0.15;
  if(r>0.3)return 0.25;
  return 0.32;
}

function scheduleSpawn(){
  if(!gameRunning)return;
  const count=getSpawnCount();
  for(let i=0;i<count;i++) spawnObject(i*200);
  spawnTimeout=setTimeout(scheduleSpawn,getSpawnInterval());
}

function spawnObject(delay){
  setTimeout(()=>{
    if(!gameRunning)return;
    const isPoop=Math.random()<getPoopRatio();
    if(isPoop){
      const size=38+Math.random()*18;
      const x=size+Math.random()*(cw-size*2);
      const speed=1.0+Math.random()*1.2+(1-gameTimer/GAME_DURATION)*1.0;
      objects.push({type:'poop',x,y:ch+size,size,speed,popped:false,popAnim:0});
    } else {
      const size=44+Math.random()*28;
      const x=size+Math.random()*(cw-size*2);
      const speed=1.2+Math.random()*1.4+(1-gameTimer/GAME_DURATION)*1.2;
      const color=BALLOON_COLORS[Math.floor(Math.random()*BALLOON_COLORS.length)];
      objects.push({type:'balloon',x,y:ch+size,size,speed,color,popped:false,popAnim:0});
    }
  },delay);
}

function renderGame(){
  if(!gameRunning&&objects.length===0)return;
  ctx.clearRect(0,0,cw,ch);

  /* 구름 */
  ctx.fillStyle='rgba(255,255,255,0.5)';
  [[60,40,50,22],[190,70,42,18],[cw-100,32,55,20],[cw-60,60,38,16]].forEach(([cx2,cy2,rx,ry])=>{
    ctx.beginPath();ctx.ellipse(cx2,cy2,rx,ry,0,0,Math.PI*2);ctx.fill();
  });

  objects=objects.filter(obj=>{
    if(obj.popped){obj.popAnim+=0.14;return obj.popAnim<=1;}
    obj.y-=obj.speed;
    if(obj.y<-obj.size*2)return false;
    if(obj.type==='balloon')drawBalloon(obj);
    else drawPoop(obj);
    return true;
  });
  animFrame=requestAnimationFrame(renderGame);
}

function drawBalloon(b){
  const{x,y,size,color}=b;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(x,y,size*0.7,size,0,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x-size*0.2,y-size*0.3,size*0.18,size*0.28,Math.PI/6,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fill();
  ctx.beginPath();ctx.arc(x,y+size,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y+size+5);
  ctx.bezierCurveTo(x+12,y+size+30,x-8,y+size+55,x+4,y+size+70);
  ctx.strokeStyle='rgba(80,80,80,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function drawPoop(p){
  /* 캔버스에 💩 이모지로 그리기 */
  const{x,y,size}=p;
  ctx.save();
  ctx.font=size*1.6+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  /* 살짝 흔들리는 느낌 */
  const wobble=Math.sin(Date.now()/200+p.x)*3;
  ctx.fillText('💩',x+wobble,y);
  ctx.restore();
}

function spawnPopEffect(x,y,isPoop){
  const wrap=document.getElementById('game-canvas-wrap');
  if(isPoop){
    /* ❌ 표시 */
    const x2=document.createElement('div');
    x2.className='poop-hit';x2.textContent='❌';
    x2.style.left=(x-22)+'px';x2.style.top=(y-22)+'px';
    wrap.appendChild(x2);
    const mt=document.createElement('div');
    mt.className='minus-text';mt.textContent='-1점 💩';
    mt.style.left=(x-32)+'px';mt.style.top=(y-54)+'px';
    wrap.appendChild(mt);
    setTimeout(()=>{x2.remove();mt.remove();},700);
  } else {
    const pop=document.createElement('div');
    pop.className='pop-effect';pop.textContent='💥';
    pop.style.left=(x-24)+'px';pop.style.top=(y-24)+'px';
    wrap.appendChild(pop);
    const txt=document.createElement('div');
    txt.className='gas-text';txt.textContent='💨 기체!';
    txt.style.left=(x-34)+'px';txt.style.top=(y-58)+'px';
    wrap.appendChild(txt);
    setTimeout(()=>{pop.remove();txt.remove();},700);
  }
}

function hitTest(px,py){
  /* 뒤에서부터(위에 그려진 것 우선) */
  for(let i=objects.length-1;i>=0;i--){
    const obj=objects[i];
    if(obj.popped)continue;
    const dx=px-obj.x,dy=py-obj.y;
    const hitRadius=obj.type==='poop'?obj.size*0.9:obj.size*0.8;
    if(Math.abs(dx)<hitRadius&&Math.abs(dy)<hitRadius){
      obj.popped=true;
      if(obj.type==='balloon'){
        gameScore++;
        document.getElementById('hud-score').textContent=gameScore;
      } else {
        gameScore=Math.max(0,gameScore-1);
        poopCount++;
        document.getElementById('hud-score').textContent=gameScore;
        document.getElementById('hud-minus').textContent=poopCount;
        /* 화면 빨간 플래시 */
        flashScreen();
      }
      spawnPopEffect(obj.x,obj.y,obj.type==='poop');
      return;
    }
  }
}

function flashScreen(){
  const wrap=document.getElementById('game-canvas-wrap');
  wrap.style.outline='4px solid #e74c3c';
  setTimeout(()=>{wrap.style.outline='none';},300);
}

function handleTouch(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const scaleX=cw/rect.width,scaleY=ch/rect.height;
  Array.from(e.changedTouches).forEach(t=>{
    hitTest((t.clientX-rect.left)*scaleX,(t.clientY-rect.top)*scaleY);
  });
}
function handleMouse(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=cw/rect.width,scaleY=ch/rect.height;
  hitTest((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
}

function endGame(){
  gameRunning=false;
  clearInterval(gameInterval);clearTimeout(spawnTimeout);cancelAnimationFrame(animFrame);
  const balloonHit=gameScore+poopCount; /* 최종점수 = 풍선-똥 이미 반영됨 */
  setTimeout(()=>{
    document.getElementById('game-canvas-wrap').style.display='none';
    document.getElementById('gameover-area').style.display='block';
    document.getElementById('go-score').textContent=gameScore;
    document.getElementById('go-balloon').textContent=gameScore+poopCount;
    document.getElementById('go-poop').textContent=poopCount;
    let goEmoji,goTitle,goMsg;
    if(gameScore>=35){goEmoji='🏆';goTitle='대단해요!';goMsg='풍선 달인이에요! 똥도 잘 피했네요! 😄';}
    else if(gameScore>=20){goEmoji='🎊';goTitle='잘했어요!';goMsg='정말 잘 터뜨렸어요!\n풍선 안에 기체가 가득 들어있었죠? 💨';}
    else if(gameScore>=10){goEmoji='😊';goTitle='수고했어요!';goMsg='잘했어요! 다시 한 번 도전해볼까요? 🎈';}
    else{goEmoji='🌱';goTitle='도전 완료!';goMsg='처음이라 어려웠죠?\n다시 해보면 더 잘할 수 있어요! 💪';}
    document.getElementById('go-emoji').textContent=goEmoji;
    document.getElementById('go-title').textContent=goTitle;
    document.getElementById('go-msg').textContent=goMsg;
  },600);
}

function replayGame(){
  document.getElementById('gameover-area').style.display='none';
  document.getElementById('game-canvas-wrap').style.display='block';
  initGame();
}
function goHome(){
  document.getElementById('game-page').style.display='none';
  document.getElementById('header-balloon').textContent='🎈';
  document.getElementById('header-title').innerHTML='기체의 성질<br>마무리 퀴즈';
  document.getElementById('header-subtitle').textContent='고등 1학년 2반 · 과학';
  current=0;score=0;answered=false;answerLog=[];
  document.getElementById('intro-page').style.display='flex';
}
</script>
